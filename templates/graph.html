<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligent Traffic Safety DSS - Graph</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#00f2fe">
  <link rel="icon" type="image/png" href="/artifact-logo">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="dashboard">
    <header class="glow-header">
      <div class="header-title-row">
        <img src="/artifact-logo" alt="Traffic Light Logo" class="header-icon">
        <h1>Intelligent Traffic Safety</h1>
      </div>
      <p>AI-Powered Risk Prediction & Alerts</p>
    </header>

    <nav class="navbar">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/history-view" class="nav-link">History Log</a>
      <a href="/graph-view" class="nav-link active">Graph View</a>
    </nav>

    <div class="main-content">
      <section class="card history-section" style="width: 100%; max-width: 900px;">
        <h2>Historical Risk Analysis</h2>
        <div class="graph-container" style="position: relative; height: 50vh; width: 100%">
          <canvas id="historyChart"></canvas>
        </div>
      </section>
    </div>
  </div>

  <script src="/static/script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js');
      });
    }
  </script>
</body>

</html>
