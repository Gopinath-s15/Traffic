<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-width=1.0">
  <meta name="description" content="Intelligent Traffic Safety Decision Support System. An AI-powered web platform for predicting traffic accident risk based on real-time vehicle speed, weather, and time conditions.">
  <meta name="keywords" content="traffic safety, intelligent traffic system, AI accident prediction, road safety, DSS, traffic risk">
  <meta name="author" content="Your Name">
  <title>Traffic Safety - Intelligent Decision Support System</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00f2fe">
  <link rel="icon" type="image/png" href="/static/shield.png">
</head>

<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="css-traffic-logo splash">
      <div class="light red"></div>
      <div class="light yellow"></div>
      <div class="light green"></div>
    </div>
    <h2 style="color: #00f2fe; margin-top:20px; font-family: 'Outfit', sans-serif;">Initializing System...</h2>
  </div>

  <div class="dashboard">
    <header class="glow-header">
      <div class="header-title-row">
        <div class="css-traffic-logo">
          <div class="light red"></div>
          <div class="light yellow"></div>
          <div class="light green"></div>
        </div>
        <h1>Intelligent Traffic Safety</h1>
      </div>
      <p>AI-Powered Risk Prediction & Alerts</p>
    </header>

    <nav class="navbar">
      <a href="/" class="nav-link active">Dashboard</a>
      <a href="/history-view" class="nav-link">History Log</a>
      <a href="/graph-view" class="nav-link">Graph View</a>
    </nav>

    <div class="main-content">
      <section class="prediction-section card">
        <h2>Predict Accident Risk</h2>
        <form id="prediction-form">
          <div class="form-group">
            <label for="speed" style="display: flex; justify-content: space-between;">
              Vehicle Speed (km/h):
              <span id="speed-status" style="font-size:0.85rem; color:var(--acc-primary);">(Auto-detecting...)</span>
            </label>
            <input type="number" id="speed" name="speed" required min="0" max="300" placeholder="e.g., 80">
          </div>

          <div class="form-group">
            <label>Auto-detected Conditions:</label>
            <div class="auto-conditions">
              <p>📍 Location: <span id="loc-text" class="status-msg">Detecting...</span></p>
              <p>🌤️ Weather: <span id="weatherText" class="status-msg">Detecting...</span></p>
              <p>🕒 Time: <span id="time-text" class="status-msg">Detecting...</span></p>
            </div>
          </div>

          <!-- Hidden inputs to send to the backend -->
          <input type="hidden" id="weather" name="weather" value="0">
          <input type="hidden" id="time" name="time" value="0">

          <button type="submit" class="btn-predict">Analyze Risk</button>
        </form>

        <div id="result-container" class="hidden">
          <h3>Prediction Result</h3>
          <div id="risk-badge" class="badge"></div>
          <p id="alert-message"></p>
          <div id="risk-map" style="margin-top: 1rem; height: 350px; width: 100%; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);"></div>
        </div>
      </section>

    </div>
  </div>

  <script src="/static/script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
