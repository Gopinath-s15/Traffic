<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Intelligent Traffic Safety DSS</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Intelligent Traffic Safety Dashboard</h1>
            <p>AI-based Risk Prediction & Alerts</p>
        </header>
        
        <div class="main-content">
            <section class="prediction-section card">
                <h2>Predict Accident Risk</h2>
                <form id="prediction-form">
                    <div class="form-group">
                        <label for="speed">Vehicle Speed (km/h):</label>
                        <input type="number" id="speed" name="speed" required min="0" max="300" placeholder="e.g., 80">
                    </div>
                    
                    <div class="form-group">
                        <label for="weather">Weather Condition:</label>
                        <select id="weather" name="weather" required>
                            <option value="0">Clear</option>
                            <option value="1">Rainy</option>
                            <option value="2">Foggy / Snow</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="time">Time of Day:</label>
                        <select id="time" name="time" required>
                            <option value="0">Day</option>
                            <option value="1">Night</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-predict">Analyze Risk</button>
                </form>

                <div id="result-container" class="hidden">
                    <h3>Prediction Result</h3>
                    <div id="risk-badge" class="badge"></div>
                    <p id="alert-message"></p>
                </div>
            </section>

            <section class="history-section card">
                <h2>Recent Predictions</h2>
                <div class="table-container">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Speed (km/h)</th>
                                <th>Weather</th>
                                <th>Time</th>
                                <th>Risk Level</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data populated via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
