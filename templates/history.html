<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="History log for the Intelligent Traffic Safety Decision Support System. View past AI predictions of traffic risk.">
  <meta name="keywords" content="traffic safety, intelligent traffic system, AI accident prediction, road safety, DSS, traffic risk">
  <meta name="author" content="Your Name">
  <title>History - Traffic Safety DSS</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#00f2fe">
  <link rel="icon" type="image/png" href="/artifact-logo">
</head>

<body>
  <div class="dashboard">
    <header class="glow-header">
      <div class="header-title-row">
        <img src="/artifact-logo" alt="Traffic Light Logo" class="header-icon">
        <h1>Intelligent Traffic Safety</h1>
      </div>
      <p>AI-Powered Risk Prediction & Alerts</p>
    </header>

    <nav class="navbar">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/history-view" class="nav-link active">History Log</a>
      <a href="/graph-view" class="nav-link">Graph View</a>
    </nav>

    <div class="main-content">
      <section class="history-section card">
        <h2>Recent Predictions</h2>
        <div class="table-container">
          <table id="history-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Speed (km/h)</th>
                <th>Weather</th>
                <th>Time</th>
                <th>Risk Level</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data populated via JS -->
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script src="/static/script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js');
      });
    }
  </script>
</body>

</html>
