<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Live traffic conditions for the Intelligent Traffic Safety Decision Support System.">
  <title>Live Traffic - Traffic Safety DSS</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00f2fe">
  <link rel="icon" type="image/png" href="/static/shield.png">
</head>

<body>
  <div class="dashboard">
    <header class="glow-header">
      <div class="header-title-row">
        <div class="css-traffic-logo">
          <div class="light red"></div>
          <div class="light yellow"></div>
          <div class="light green"></div>
        </div>
        <h1>Intelligent Traffic Safety</h1>
      </div>
      <p>AI-Powered Risk Prediction & Alerts</p>
    </header>

    <nav class="navbar">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/traffic-view" class="nav-link active">Live Traffic</a>
      <a href="/history-view" class="nav-link">History Log</a>
      <a href="/graph-view" class="nav-link">Graph View</a>
    </nav>

    <div class="main-content">
      <section class="traffic-section card" style="height: 65vh; display: flex; flex-direction: column;">
        <h2 style="margin-bottom: 1rem;">Live Traffic Conditions</h2>
        <div id="live-traffic-map" style="flex: 1; width: 100%; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);"></div>
      </section>
    </div>
  </div>

  <script src="/static/script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
